name: CI

on:
  push:
  pull_request:

env:
  PYTHON_FILES: main.py database.py models.py schemas.py constants.py test_main.py
  MYPY_FILES: main.py database.py models.py schemas.py constants.py

jobs:
  lint:
    name: ${{ matrix.linter }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - linter: black
            run: black --check
          - linter: isort
            run: isort --check-only
          - linter: flake8
            run: flake8
          - linter: mypy
            run: mypy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install fastapi sqlalchemy aiosqlite greenlet pydantic

      - name: Run ${{ matrix.linter }}
        run: ${{ matrix.run }} ${{ matrix.linter == 'mypy' && env.MYPY_FILES || env.PYTHON_FILES }}
