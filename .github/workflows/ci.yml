name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install fastapi sqlalchemy aiosqlite greenlet httpx pytest pydantic

      - name: Check formatting with Black
        run: black --check main.py database.py models.py schemas.py constants.py test_main.py

      - name: Check import order with isort
        run: isort --check-only main.py database.py models.py schemas.py constants.py test_main.py

      - name: Lint with Flake8
        run: flake8 main.py database.py models.py schemas.py constants.py test_main.py

      - name: Type check with mypy
        run: mypy main.py database.py models.py schemas.py constants.py
