[flake8]
max-line-length = 88
extend-ignore = E203, W503, B008
exclude = .venv,.venv*,.git,__pycache__,.idea
per-file-ignores =
    test_main.py:F401

[isort]
profile = black
line_length = 88
skip = .venv,.venv*,.git,__pycache__,.idea

[mypy]
python_version = 3.10
ignore_missing_imports = True
exclude = .venv
